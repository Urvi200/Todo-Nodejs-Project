<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenTodo | Organize Your Life</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div id="auth-container" class="container">
        <div class="glass-card auth-card">
            <h1 id="auth-title">Welcome Back</h1>
            <p id="auth-subtitle">Login to manage your tasks</p>
            
            <form id="auth-form">
                <div class="input-group" id="name-field" style="display: none;">
                    <i class="fas fa-user"></i>
                    <input type="text" id="reg-name" placeholder="Full Name">
                </div>
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="auth-email" placeholder="Email Address" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="auth-password" placeholder="Password" required>
                </div>
                <button type="submit" id="auth-submit-btn" class="btn-primary">Login</button>
            </form>
            
            <p class="toggle-text">
                <span id="toggle-msg">Don't have an account?</span>
                <a href="#" id="toggle-auth">Register</a>
            </p>
        </div>
    </div>

    <div id="dashboard-container" class="container" style="display: none;">
        <header class="glass-card nav-header">
            <div class="logo">Zen<span>Todo</span></div>
            <div class="user-controls">
                <span id="user-display">Hello, User</span>
                <button id="logout-btn" class="btn-icon"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </header>

        <main>
            <div class="dashboard-controls">
                <div class="glass-card stats-card">
                    <div class="stat-item">
                        <span class="stat-value" id="total-count">0</span>
                        <span class="stat-label">Total</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value" id="completed-count">0</span>
                        <span class="stat-label">Done</span>
                    </div>
                </div>
                <div class="glass-card search-card">
                    <i class="fas fa-search"></i>
                    <input type="text" id="search-input" placeholder="Search tasks...">
                </div>
            </div>

            <div class="glass-card add-todo-section">
                <input type="text" id="todo-input" placeholder="What needs to be done?">
                <button id="add-btn" class="btn-primary">Add Task</button>
            </div>

            <div class="filters">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="pending">Pending</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
            </div>

            <div id="todo-list" class="todo-list">
                <div class="loader" id="main-loader"></div>
            </div>
        </main>
    </div>

    <div id="toast-container"></div>

    <script src="script.js"></script>
</body>
</html>
